<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARSIS — home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/reset-base.css" />
  <link rel="stylesheet" href="../css/pixel-ui.css" />
  <link rel="stylesheet" href="../css/crt.css" />
  <link rel="stylesheet" href="../css/glitch-fx.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body class="page-home">
  <svg class="crt-filters" aria-hidden="true" focusable="false">
    <defs>
      <filter id="crt-grain" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="42" result="noise" />
        <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.35  0 0 0 0 0.55  0 0 0 0 0.52  0 0 0 0.22 0" result="tinted" />
        <feComposite in="tinted" in2="SourceGraphic" operator="over" />
      </filter>
    </defs>
  </svg>

  <div id="app-glitch-stage" class="app-glitch-stage">
    <div class="crt-root crt-root--home">
      <div class="crt-scanlines" aria-hidden="true"></div>
      <div class="crt-pixel-grid" aria-hidden="true"></div>

      <main class="home-main">
        <div class="home-title" aria-live="polite" aria-atomic="true">
          <h1 class="home-title__text" id="cube-title">НЕ ДОСТУПНО</h1>
        </div>
        <div class="cube-stage" id="cube-stage">
          <div class="cube" id="cube" role="button" tabindex="0" aria-label="ARSIS cube hub">
            <div class="face face--front" data-face="front"></div>
            <div class="face face--back" data-face="back"></div>
            <div class="face face--right" data-face="right"></div>
            <div class="face face--left" data-face="left"></div>
            <div class="face face--top" data-face="top"></div>
            <div class="face face--bottom" data-face="bottom"></div>
          </div>
        </div>
      </main>

      <div class="crt-grain-layer" aria-hidden="true"></div>
    </div>

    <div id="glitch-fx-layer" class="glitch-fx-layer" aria-hidden="true"></div>
  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
